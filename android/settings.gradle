pluginManagement {
    // This makes the plugin available for the `plugins {}` block below
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = "tijara"

include(":app")

include ":react-native-vector-icons"
project(":react-native-vector-icons").projectDir = new File(
        rootProject.projectDir,
        "../node_modules/react-native-vector-icons/android"
)

// This second includeBuild is required so that the react-native-gradle-plugin
// artifacts (e.g. react-native-gradle-plugin) are available as buildscript
// classpath dependencies in build.gradle. Both declarations serve different
// purposes and Gradle deduplicates them internally.
includeBuild("../node_modules/@react-native/gradle-plugin")
